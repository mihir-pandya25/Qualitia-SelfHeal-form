<!DOCTYPE html>
<html>
<head>
  <title>Exam Registration Form</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: left;
      color: #2c3e50;
      margin-bottom: 20px;
    }

    form {
      background: #ffffff;
      max-width: 700px;
      margin: auto;
      padding: 25px 30px;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 6px;
      font-weight: 600;
      color: #333;
    }

    input[type="text"],
    input[type="number"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      transition: 0.2s;
      box-sizing: border-box;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #4a90e2;
      outline: none;
      box-shadow: 0 0 0 3px rgba(74,144,226,0.15);
    }

    .checkbox-group {
      display: flex;
      gap: 20px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    .checkbox-group label {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #218838;
    }
  </style>
</head>

<body>

  <form>
    <h2>Exam Registration Form</h2>

    <label>Full Name:</label>
    <input type="text" name="fullname">

   <label>Highest Education Level:</label>
    <select name="education">
      <option>High School</option>
      <option>Diploma</option>
      <option>Bachelor's</option>
      <option>Master's</option>
    </select>   

    <label>Exam Subjects:</label>
    <div class="checkbox-group">
      <label><input type="checkbox" name="math"> Math</label>
      <label><input type="checkbox" name="science"> Science</label>
      <label><input type="checkbox" name="english"> English</label>
    </div>

    <label>Select Payment Method:</label>
    <select name="payment">
      <option>Credit Card</option>
      <option>Debit Card</option>
      <option>UPI</option>
    </select>

    <label>Card Number:</label>
    <input type="text" name="cardnumber">

  

    <label>Document Type:</label>
    <select name="document">
      <option>Voter ID</option>
      <option>Aadhar Card</option>
      <option>Passport</option>
    </select>

 <label>Identification Number:</label>
    <textarea name="idnumber"></textarea>   

    <button type="submit">Submit</button>
  </form>

</body>
</html>
